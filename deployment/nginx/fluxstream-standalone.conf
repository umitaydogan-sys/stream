worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;

    # Optional same-server cache. FluxStream works without this file.
    proxy_cache_path C:/nginx/cache/fluxstream
        levels=1:2
        keys_zone=flux_media_cache:256m
        max_size=50g
        inactive=30m
        use_temp_path=off;

    upstream flux_origin {
        server 127.0.0.1:8844;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 100m;

        # Live manifests must stay uncached.
        location ~* ^/(hls|dash)/.+\.(m3u8|mpd)$ {
            proxy_pass http://flux_origin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;

            proxy_no_cache 1;
            proxy_cache_bypass 1;

            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # HLS/DASH segments can be cached safely on the same machine.
        location ~* ^/(hls|dash)/.+\.(ts|m4s|mp4)$ {
            proxy_pass http://flux_origin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache flux_media_cache;
            proxy_cache_lock on;
            proxy_cache_revalidate on;
            proxy_cache_background_update on;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_valid 200 206 15m;

            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=900, immutable" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # Static UI assets are safe to cache longer.
        location /static/ {
            proxy_pass http://flux_origin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            proxy_cache flux_media_cache;
            proxy_cache_valid 200 7d;

            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=604800, immutable" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # Raw live protocols should not be cached.
        location ~* ^/(flv|mp4|webm|audio|icecast)/ {
            proxy_pass http://flux_origin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # Everything else is proxied directly.
        location / {
            proxy_pass http://flux_origin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
